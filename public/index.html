<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobClaw 🦞 看板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; }
    .log-info  { color: #4ade80; }
    .log-warn  { color: #facc15; }
    .log-error { color: #f87171; }
    .ws-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .ws-connected    { background: #22c55e; }
    .ws-disconnected { background: #ef4444; }
    #modal-overlay { display: none; }
    #modal-overlay.active { display: flex; }
    .sortable-th { cursor: pointer; user-select: none; }
    .sortable-th:hover { color: #93c5fd; }
  </style>
</head>
<body class="min-h-screen p-4 font-mono">

<!-- ── Header ───────────────────────────────────────────────────────────────── -->
<header class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-blue-400">JobClaw 🦞 看板</h1>
  <div class="flex items-center gap-2 text-sm">
    <span id="ws-dot" class="ws-dot ws-disconnected"></span>
    <span id="ws-status" class="text-gray-400">未连接</span>
  </div>
</header>

<!-- ── Main grid ─────────────────────────────────────────────────────────────── -->
<div class="grid grid-cols-1 xl:grid-cols-3 gap-4">

  <!-- Left column (2/3) -->
  <div class="xl:col-span-2 flex flex-col gap-4">

    <!-- Dashboard: Agent States -->
    <section class="bg-slate-800 rounded-xl p-4">
      <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Agent 状态</h2>
      <div id="agent-states" class="flex flex-wrap gap-3">
        <span class="text-slate-500 text-sm">等待连接...</span>
      </div>
    </section>

    <!-- Job Table -->
    <section class="bg-slate-800 rounded-xl p-4">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">职位列表</h2>
        <button id="refresh-jobs" class="text-xs bg-blue-600 hover:bg-blue-500 text-white px-3 py-1 rounded">
          刷新
        </button>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr class="text-slate-400 border-b border-slate-700">
              <th class="sortable-th text-left py-2 pr-3" data-col="company">公司 ⇅</th>
              <th class="sortable-th text-left py-2 pr-3" data-col="title">职位 ⇅</th>
              <th class="text-left py-2 pr-3">链接</th>
              <th class="sortable-th text-left py-2 pr-3" data-col="status">状态 ⇅</th>
              <th class="sortable-th text-left py-2" data-col="time">时间 ⇅</th>
            </tr>
          </thead>
          <tbody id="job-tbody" class="divide-y divide-slate-700">
            <tr><td colspan="5" class="py-3 text-slate-500 text-center">暂无数据</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- Activity Log -->
    <section class="bg-slate-800 rounded-xl p-4">
      <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">活动流水</h2>
      <div id="activity-log"
           class="h-52 overflow-y-auto flex flex-col-reverse gap-0.5 text-xs bg-slate-900 rounded p-3">
        <span class="text-slate-500">等待 Agent 日志...</span>
      </div>
    </section>

  </div><!-- /left column -->

  <!-- Right column (1/3) -->
  <div class="flex flex-col gap-4">

    <!-- Donut chart -->
    <section class="bg-slate-800 rounded-xl p-4">
      <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">投递统计</h2>
      <div class="flex justify-center">
        <canvas id="donut-chart" width="220" height="220"></canvas>
      </div>
      <div id="stats-legend" class="flex justify-center gap-4 mt-3 text-xs text-slate-400"></div>
    </section>

    <!-- Markdown Editor -->
    <section class="bg-slate-800 rounded-xl p-4">
      <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">配置编辑器</h2>
      <div class="flex gap-2 mb-2">
        <button id="tab-targets"
                class="tab-btn text-xs px-3 py-1 rounded bg-blue-600 text-white"
                data-file="targets">targets.md</button>
        <button id="tab-userinfo"
                class="tab-btn text-xs px-3 py-1 rounded bg-slate-700 text-slate-300 hover:bg-slate-600"
                data-file="userinfo">userinfo.md</button>
      </div>
      <textarea id="md-editor"
                class="w-full h-40 bg-slate-900 text-slate-200 text-xs p-2 rounded resize-none outline-none border border-slate-700 focus:border-blue-500"
                placeholder="加载中..."></textarea>
      <div class="flex items-center gap-2 mt-2">
        <button id="save-md"
                class="text-xs bg-green-700 hover:bg-green-600 text-white px-3 py-1 rounded">
          保存
        </button>
        <span id="save-status" class="text-xs text-slate-400"></span>
      </div>
    </section>

    <!-- Resume Action -->
    <section class="bg-slate-800 rounded-xl p-4">
      <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">简历操作</h2>
      <button id="gen-resume"
              class="w-full text-sm bg-purple-700 hover:bg-purple-600 text-white py-2 rounded">
        生成简历 PDF
      </button>
      <div id="resume-preview" class="mt-3 hidden">
        <a id="resume-link" href="#" target="_blank"
           class="text-xs text-blue-400 underline">查看生成的 PDF</a>
      </div>
    </section>

  </div><!-- /right column -->
</div><!-- /grid -->

<!-- ── Intervention Modal ─────────────────────────────────────────────────── -->
<div id="modal-overlay"
     class="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
  <div class="bg-slate-800 border border-yellow-500 rounded-xl p-6 w-full max-w-lg shadow-2xl">
    <h3 class="text-yellow-400 font-bold text-lg mb-2">⚠ 人工干预请求</h3>
    <p id="modal-prompt" class="text-slate-300 text-sm mb-4 whitespace-pre-wrap"></p>
    <label class="text-xs text-slate-400 block mb-1">请输入响应（Enter 提交）：</label>
    <input id="modal-input" type="text"
           class="w-full bg-slate-900 border border-slate-600 text-white text-sm px-3 py-2 rounded outline-none focus:border-yellow-400"
           placeholder="输入内容并按 Enter..." />
    <div class="flex gap-2 mt-4">
      <button id="modal-submit"
              class="flex-1 bg-yellow-500 hover:bg-yellow-400 text-black font-semibold py-2 rounded text-sm">
        提交
      </button>
      <button id="modal-cancel"
              class="px-4 bg-slate-700 hover:bg-slate-600 text-slate-300 py-2 rounded text-sm">
        跳过
      </button>
    </div>
  </div>
</div>

<!-- ── Scripts ────────────────────────────────────────────────────────────── -->
<script>
// ─── State ──────────────────────────────────────────────────────────────────
let currentAgentName = 'main'
let currentFile = 'targets'
let jobs = []
let sortCol = 'time'
let sortAsc = false
let donutChart = null
let interventionAgentName = 'main'

// ─── WebSocket with auto-reconnect ──────────────────────────────────────────
let ws = null
let reconnectTimer = null
const WS_RECONNECT_DELAY_MS = 3000

// Named WS event handlers — stored so they can be removed with removeEventListener
function onWsOpen() {
  setWsStatus(true)
  clearTimeout(reconnectTimer)
}

function onWsMessage(ev) {
  try {
    const { event, data } = JSON.parse(ev.data)
    handleWsEvent(event, data)
  } catch { /* ignore malformed */ }
}

function onWsClose() {
  setWsStatus(false)
  reconnectTimer = setTimeout(connectWS, WS_RECONNECT_DELAY_MS)
}

function onWsError() {
  ws.close()
}

function connectWS() {
  // Remove listeners from previous socket before creating a new one
  if (ws) {
    ws.removeEventListener('open', onWsOpen)
    ws.removeEventListener('message', onWsMessage)
    ws.removeEventListener('close', onWsClose)
    ws.removeEventListener('error', onWsError)
  }
  const proto = location.protocol === 'https:' ? 'wss' : 'ws'
  ws = new WebSocket(`${proto}://${location.host}/ws`)
  ws.addEventListener('open', onWsOpen)
  ws.addEventListener('message', onWsMessage)
  ws.addEventListener('close', onWsClose)
  ws.addEventListener('error', onWsError)
}

function setWsStatus(connected) {
  const dot = document.getElementById('ws-dot')
  const label = document.getElementById('ws-status')
  dot.className = 'ws-dot ' + (connected ? 'ws-connected' : 'ws-disconnected')
  label.textContent = connected ? '已连接' : '未连接'
}

// ─── WebSocket event dispatcher ─────────────────────────────────────────────
function handleWsEvent(event, data) {
  switch (event) {
    case 'snapshot':
      // data is an array of AgentStateEvent
      if (Array.isArray(data)) data.forEach(d => updateAgentState(d))
      break
    case 'agent:state':
      updateAgentState(data)
      break
    case 'agent:log':
      appendLog(data)
      break
    case 'job:updated':
      fetchJobs()
      break
    case 'intervention:required':
      showModal(data)
      break
    case 'intervention:resolved':
      hideModal()
      break
  }
}

// ─── Agent State Cards ───────────────────────────────────────────────────────
const agentStates = {}

function updateAgentState({ agentName, state }) {
  agentStates[agentName] = state
  renderAgentCards()
}

function renderAgentCards() {
  const container = document.getElementById('agent-states')
  const stateColors = {
    idle:    'bg-slate-700 text-slate-300',
    running: 'bg-blue-700 text-blue-100',
    waiting: 'bg-yellow-700 text-yellow-100',
    error:   'bg-red-700 text-red-100',
  }
  container.innerHTML = Object.entries(agentStates).map(([name, state]) => `
    <div class="flex items-center gap-2 px-3 py-1.5 rounded-lg ${stateColors[state] ?? 'bg-slate-700 text-slate-300'}">
      <span class="font-semibold">${escHtml(name)}</span>
      <span class="text-xs opacity-75">${escHtml(state)}</span>
    </div>
  `).join('') || '<span class="text-slate-500 text-sm">暂无 Agent 信息</span>'
}

// ─── Activity Log ────────────────────────────────────────────────────────────
const MAX_LOG_LINES = 200
const logLines = []

function appendLog({ type, message, timestamp, agentName }) {
  const ts = timestamp ? new Date(timestamp).toLocaleTimeString() : ''
  const cls = type === 'error' ? 'log-error' : type === 'warn' ? 'log-warn' : 'log-info'
  const agent = agentName ? `[${escHtml(agentName)}] ` : ''
  const line = `<div class="${cls}">[${ts}] ${agent}${escHtml(message)}</div>`
  logLines.unshift(line)
  if (logLines.length > MAX_LOG_LINES) logLines.pop()
  document.getElementById('activity-log').innerHTML = logLines.join('')
}

// ─── Job Table ───────────────────────────────────────────────────────────────
async function fetchJobs() {
  try {
    const res = await fetch('/api/jobs')
    jobs = await res.json()
    renderJobs()
    renderDonut()
  } catch { /* ignore */ }
}

function renderJobs() {
  const sorted = [...jobs].sort((a, b) => {
    const av = a[sortCol] ?? ''
    const bv = b[sortCol] ?? ''
    return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av)
  })
  const tbody = document.getElementById('job-tbody')
  if (!sorted.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="py-3 text-slate-500 text-center">暂无数据</td></tr>'
    return
  }
  tbody.innerHTML = sorted.map(r => `
    <tr class="hover:bg-slate-700/50">
      <td class="py-1.5 pr-3">${escHtml(r.company)}</td>
      <td class="py-1.5 pr-3">${escHtml(r.title)}</td>
      <td class="py-1.5 pr-3">
        ${r.url ? `<a href="${escHtml(r.url)}" target="_blank" class="text-blue-400 underline">链接</a>` : '—'}
      </td>
      <td class="py-1.5 pr-3">
        <span class="${statusColor(r.status)}">${escHtml(r.status)}</span>
      </td>
      <td class="py-1.5">${escHtml(r.time)}</td>
    </tr>
  `).join('')
}

function statusColor(s) {
  if (s === 'applied')    return 'text-green-400'
  if (s === 'failed')     return 'text-red-400'
  if (s === 'discovered') return 'text-blue-400'
  return 'text-slate-400'
}

// Column sort
document.querySelectorAll('.sortable-th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col
    if (sortCol === col) { sortAsc = !sortAsc } else { sortCol = col; sortAsc = true }
    renderJobs()
  })
})

document.getElementById('refresh-jobs').addEventListener('click', fetchJobs)

// ─── Donut Chart ─────────────────────────────────────────────────────────────
function renderDonut() {
  const applied    = jobs.filter(j => j.status === 'applied').length
  const discovered = jobs.filter(j => j.status === 'discovered').length
  const failed     = jobs.filter(j => j.status === 'failed').length
  const other      = jobs.length - applied - discovered - failed

  const data = {
    labels: ['已投递', '已发现', '失败', '其他'],
    datasets: [{
      data: [applied, discovered, failed, other],
      backgroundColor: ['#22c55e', '#3b82f6', '#ef4444', '#94a3b8'],
      borderWidth: 0,
    }]
  }

  if (donutChart) {
    donutChart.data = data
    donutChart.update()
  } else {
    const ctx = document.getElementById('donut-chart').getContext('2d')
    donutChart = new Chart(ctx, {
      type: 'doughnut',
      data,
      options: {
        cutout: '65%',
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: { label: (ctx) => ` ${ctx.label}: ${ctx.parsed}` }
          }
        }
      }
    })
  }

  document.getElementById('stats-legend').innerHTML =
    `<span class="text-green-400">投递 ${applied}</span>` +
    `<span class="text-blue-400">发现 ${discovered}</span>` +
    `<span class="text-red-400">失败 ${failed}</span>`
}

// ─── Markdown Editor ─────────────────────────────────────────────────────────
async function loadFile(name) {
  currentFile = name
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const active = btn.dataset.file === name
    btn.className = `tab-btn text-xs px-3 py-1 rounded ${active ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`
  })
  try {
    const res = await fetch(`/api/config/${name}`)
    const json = await res.json()
    document.getElementById('md-editor').value = json.content ?? ''
    document.getElementById('save-status').textContent = ''
  } catch {
    document.getElementById('md-editor').value = ''
    document.getElementById('save-status').textContent = '加载失败'
  }
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => loadFile(btn.dataset.file))
})

document.getElementById('save-md').addEventListener('click', async () => {
  const status = document.getElementById('save-status')
  status.textContent = '正在锁定文件...'
  try {
    const content = document.getElementById('md-editor').value
    const res = await fetch(`/api/config/${currentFile}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content })
    })
    const json = await res.json()
    status.textContent = json.ok ? '✓ 已保存' : `✗ ${json.error}`
  } catch (e) {
    status.textContent = `✗ ${e.message}`
  }
  setTimeout(() => { status.textContent = '' }, 3000)
})

// ─── Resume Action ────────────────────────────────────────────────────────────
document.getElementById('gen-resume').addEventListener('click', async () => {
  const btn = document.getElementById('gen-resume')
  btn.disabled = true
  btn.setAttribute('aria-busy', 'true')
  btn.textContent = '生成中...'
  try {
    const res = await fetch('/api/resume/build', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
    })
    const json = await res.json()
    if (json.ok) {
      const preview = document.getElementById('resume-preview')
      const link = document.getElementById('resume-link')
      link.href = '/workspace/output/resume.pdf'
      preview.classList.remove('hidden')
    }
  } catch { /* ignore */ } finally {
    btn.disabled = false
    btn.setAttribute('aria-busy', 'false')
    btn.textContent = '生成简历 PDF'
  }
})

// ─── Intervention Modal ───────────────────────────────────────────────────────
function showModal({ agentName, prompt }) {
  interventionAgentName = agentName ?? 'main'
  document.getElementById('modal-prompt').textContent = prompt ?? ''
  const overlay = document.getElementById('modal-overlay')
  overlay.classList.add('active')
  setTimeout(() => document.getElementById('modal-input').focus(), 50)
}

function hideModal() {
  document.getElementById('modal-overlay').classList.remove('active')
  document.getElementById('modal-input').value = ''
}

async function submitIntervention() {
  const input = document.getElementById('modal-input').value
  hideModal()
  try {
    await fetch('/api/intervention', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ input, agentName: interventionAgentName })
    })
  } catch { /* ignore */ }
}

document.getElementById('modal-submit').addEventListener('click', submitIntervention)
document.getElementById('modal-cancel').addEventListener('click', () => {
  hideModal()
  fetch('/api/intervention', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ input: '', agentName: interventionAgentName })
  }).catch(() => {})
})
document.getElementById('modal-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') submitIntervention()
})

// ─── Escape key closes modal ──────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('modal-overlay').classList.contains('active')) {
    document.getElementById('modal-cancel').click()
  }
})

// ─── XSS helper ──────────────────────────────────────────────────────────────
function escHtml(str) {
  if (!str) return ''
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
}

// ─── Init ─────────────────────────────────────────────────────────────────────
connectWS()
fetchJobs()
loadFile('targets')
</script>
</body>
</html>
